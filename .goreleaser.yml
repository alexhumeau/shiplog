version: 2
builds:
  - main: ./cmd/shiplog
    binary: shiplog
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "shiplog-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: alexhumeau
      name: homebrew-tap
    homepage: "https://shiplog.sh"
    description: "Auto-generate a structured changelog from git history"
    license: "MIT"
    install: |
      bin.install "shiplog"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
